<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Trading Radar Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111827;
      --border: #243244;
      --text: #e5edf7;
      --muted: #96a3b6;
      --accent: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      color: var(--muted);
      font-size: 13px;
    }

    input,
    select,
    button {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0f172a;
      color: var(--text);
      padding: 0 10px;
      font-size: 14px;
    }

    input {
      width: 180px;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      color: #06120a;
      font-weight: 700;
    }

    main {
      height: calc(100vh - 63px);
      min-height: 520px;
    }

    .tradingview-widget-container,
    #tradingview_chart {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Trading Radar Dashboard</h1>
    <div class="controls">
      <label for="symbol">Symbol</label>
      <input id="symbol" value="BINANCE:BTCUSDT">
      <label for="interval">Interval</label>
      <select id="interval">
        <option value="1">1m</option>
        <option value="5">5m</option>
        <option value="15">15m</option>
        <option value="60">1h</option>
        <option value="D">1D</option>
      </select>
      <button id="load">Load Chart</button>
    </div>
  </header>

  <main>
    <div class="tradingview-widget-container">
      <div id="tradingview_chart"></div>
    </div>
  </main>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    function loadChart() {
      const symbol = document.getElementById("symbol").value.trim() || "BINANCE:BTCUSDT";
      const interval = document.getElementById("interval").value;
      document.getElementById("tradingview_chart").innerHTML = "";

      new TradingView.widget({
        autosize: true,
        symbol,
        interval,
        timezone: "Asia/Jakarta",
        theme: "dark",
        style: "1",
        locale: "en",
        toolbar_bg: "#111827",
        enable_publishing: false,
        allow_symbol_change: true,
        container_id: "tradingview_chart",
        studies: [
          "RSI@tv-basicstudies",
          "MASimple@tv-basicstudies"
        ]
      });
    }

    document.getElementById("load").addEventListener("click", loadChart);
    loadChart();
  </script>
</body>
</html>
